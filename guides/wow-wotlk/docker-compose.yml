# Dad's MMO Lab — World of Warcraft Offline Server
# AzerothCore + NPCBots on Steam Deck
# https://github.com/DadsMmoLab/dads-mmo-lab
#
# USAGE:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker logs -f ac_worldserver
#   Console: docker attach ac_worldserver
#            (detach with Ctrl+P then Ctrl+Q)

version: '3.8'

services:

  # ─────────────────────────────────────────
  # DATABASE
  # Stores all game data, characters, accounts
  # ─────────────────────────────────────────
  ac-database:
    image: mysql:8.0
    container_name: ac_database
    environment:
      MYSQL_ROOT_PASSWORD: azeroth
      MYSQL_DATABASE: acore_world
    volumes:
      - ac-database:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - ac-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pazeroth"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # AUTH SERVER
  # Handles login / account authentication
  # ─────────────────────────────────────────
  ac-authserver:
    image: azerothcore/azerothcore:authserver
    container_name: ac_authserver
    environment:
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;azeroth;acore_auth"
    depends_on:
      ac-database:
        condition: service_healthy
    ports:
      - "3724:3724"
    restart: unless-stopped
    networks:
      - ac-network

  # ─────────────────────────────────────────
  # WORLD SERVER
  # The actual game world — quests, NPCs, etc.
  # ─────────────────────────────────────────
  ac-worldserver:
    image: azerothcore/azerothcore:worldserver
    container_name: ac_worldserver
    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_CONFIG_DIR: "/azerothcore/env/dist/etc"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;azeroth;acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;azeroth;acore_characters"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;azeroth;acore_auth"
    depends_on:
      ac-database:
        condition: service_healthy
    volumes:
      - ./config/worldserver.conf:/azerothcore/env/dist/etc/worldserver.conf:ro
      - ./config/authserver.conf:/azerothcore/env/dist/etc/authserver.conf:ro
      - ./logs:/azerothcore/env/dist/logs
    ports:
      - "8085:8085"
      - "7878:7878"
    restart: unless-stopped
    networks:
      - ac-network
    stdin_open: true
    tty: true
    # Steam Deck resource limits — adjust if you have issues
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────
volumes:
  ac-database:
    name: dads_mmo_wow_db

networks:
  ac-network:
    name: dads_mmo_network
    driver: bridge
